syntax = "proto3";

package exex.indexer;

service RemoteIndexer {
  rpc Subscribe(SubscribeRequest) returns (stream ExExNotification) {}
}

message SubscribeRequest {}

enum ExExNotificationKind {
  EX_EX_NOTIFICATION_KIND_UNKNOWN = 0;
  EX_EX_NOTIFICATION_KIND_CHAIN_COMMITTED = 1;
  EX_EX_NOTIFICATION_KIND_CHAIN_REORGED = 2;
  EX_EX_NOTIFICATION_KIND_CHAIN_REVERTED = 3;
}

message BlockRef {
  uint64 number = 1;
  bytes hash = 2;
}

message BlockRange {
  uint64 first = 1;
  uint64 last = 2;
}

message ExExNotification {
  ExExNotificationKind kind = 1;
  optional BlockRange old_range = 2;
  optional BlockRange new_range = 3;
  optional BlockRef fork_block = 4;
  optional BlockRef tip_block = 5;
  repeated Block new_blocks = 6;
  uint64 chain_id = 7;
}

message Block {
  uint64 number = 1;
  bytes hash = 2;
  bytes parent_hash = 3;
  uint64 timestamp = 4;
  repeated Transaction transactions = 5;
  uint64 chain_id = 6;
}

message Transaction {
  bytes hash = 1;
  uint32 index = 2;
  bytes from = 3;
  optional bytes to = 4;
  string value_raw = 5;
  repeated Log logs = 6;
}

message Log {
  uint32 index = 1;
  bytes contract_address = 2;
  repeated bytes topics = 3;
  bytes data = 4;
}
